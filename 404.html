<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>העמוד לא נמצא — Our Day</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #fffaf4; color: #3a2a20; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 24px; line-height: 1.7;
    }
    .card {
      background: #fff; border: 1px solid #eadfd6; border-radius: 22px;
      padding: 44px 32px; max-width: 460px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    h1 { color: #5c4033; font-size: 26px; margin: 10px 0 8px; }
    p { color: #8a6a58; font-size: 15px; margin-bottom: 22px; }
    .code { font-size: 42px; color: #c98a8a; font-weight: 800; }
    a {
      display: inline-block; background: #5c4033; color: #fff; text-decoration: none;
      padding: 10px 26px; border-radius: 999px; font-weight: 600; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>העמוד הזה לא נמצא</h1>
    <p>אולי הקישור השתנה — אבל החתונה עדיין בדרך. בואו נחזור הביתה.</p>
    <a href="/">לדף הבית</a>
  </div>
</body>
</html>
